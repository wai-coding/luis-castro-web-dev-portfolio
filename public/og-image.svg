<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f0f"/>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accentGradient)"/>
  
  <!-- Decorative corner elements -->
  <rect x="60" y="60" width="40" height="4" fill="#6366f1" opacity="0.6"/>
  <rect x="60" y="60" width="4" height="40" fill="#6366f1" opacity="0.6"/>
  
  <rect x="1100" y="566" width="40" height="4" fill="#6366f1" opacity="0.6"/>
  <rect x="1136" y="530" width="4" height="40" fill="#6366f1" opacity="0.6"/>
  
  <!-- Main content -->
  <text x="600" y="240" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">
    Luís Castro
  </text>
  
  <text x="600" y="320" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="500" fill="#a1a1aa" text-anchor="middle">
    Junior Full Stack Developer
  </text>
  
  <!-- Divider line -->
  <rect x="450" y="370" width="300" height="2" fill="#27272a"/>
  
  <!-- Tech stack -->
  <text x="600" y="430" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="400" fill="#71717a" text-anchor="middle">
    React • Node.js • Express • MongoDB
  </text>
  
  <!-- Subtle code decoration -->
  <text x="80" y="560" font-family="monospace" font-size="14" fill="#3f3f46" opacity="0.5">
    &lt;/&gt;
  </text>
  <text x="1080" y="100" font-family="monospace" font-size="14" fill="#3f3f46" opacity="0.5">
    { }
  </text>
</svg>
